name: Kirim Notif ke Discord

on:
  push:
    branches:
      - main

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # WAJIB: Mengambil seluruh riwayat agar git log bisa membandingkan commit

      - name: Kirim pesan ke Discord mirip GitHub log
        env:
          DISCORD_NOTIF: ${{ secrets.DISCORD_NOTIF }}
        run: |
          # 1. Menentukan rentang commit yang baru di-push
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.event.after }}"
          
          if [ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]; then
            RANGE="-1"
          else
            RANGE="$BEFORE_SHA..$AFTER_SHA"
          fi

          # 2. Ambil data pendukung
          AUTHOR_AVATAR="$(curl -s https://github.com{{ github.actor }} | grep avatar_url | cut -d '"' -f4)"
          BRANCH="${{ github.ref_name }}"
          
          # 3. Hitung jumlah commit dalam push ini
          COMMIT_COUNT=$(git rev-list --count $RANGE)
          
          # 4. Murni teks biasa: Format hanya [`sha`] pesan - author tanpa link markdown
          COMMIT_LIST=$(git log $RANGE --pretty=format:"\`%h\` %s - %an" | sed ':a;N;$!ba;s/\n/\\n/g')

          # 5. Susun Payload JSON (Tanpa parameter "url" di judul maupun deskripsi)
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "author": {
                "name": "${{ github.actor }}",
                "icon_url": "$AUTHOR_AVATAR"
              },
              "title": "[whoisfeb/Polda-Merah-Putih:$BRANCH] $COMMIT_COUNT new commit(s)",
              "description": "$COMMIT_LIST",
              "color": 7506394
            }]
          }
          EOF
          )

          # 6. Kirim ke Discord menggunakan token dari secret DISCORD_NOTIF
          echo "Mengirim $COMMIT_COUNT commit ke Discord..."
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "$DISCORD_NOTIF"
