name: Kirim Notif ke Discord

on:
  push:
    branches:
      - main

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # WAJIB: Mengambil seluruh riwayat agar git log bisa membandingkan commit

      - name: Kirim pesan ke Discord mirip GitHub log
        env:
          DISCORD_NOTIF: ${{ secrets.DISCORD_NOTIF }}
        run: |
          # 1. Menentukan rentang commit yang baru di-push
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.event.after }}"
          
          if [ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]; then
            RANGE="-1"
          else
            RANGE="$BEFORE_SHA..$AFTER_SHA"
          fi

          # 2. Ambil data pendukung
          AUTHOR_AVATAR="https://github.com{{ github.actor }}.png"
          BRANCH="${{ github.ref_name }}"
          
          # 3. Hitung jumlah commit dalam push ini
          COMMIT_COUNT=$(git rev-list --count $RANGE)
          
          # 4. Ambil teks log commit mentah (tanpa manipulasi sed manual yang rawan error)
          COMMIT_LIST=$(git log $RANGE --pretty=format:"\`%h\` %s - %an")

          # 5. SOLUSI UTAMA: Menggunakan jq untuk menyusun JSON agar karakter spesial otomatis aman ter-escape
          PAYLOAD=$(jq -n \
            --arg name "${{ github.actor }}" \
            --arg icon "$AUTHOR_AVATAR" \
            --arg title "[whoisfeb/Polda-Merah-Putih:$BRANCH] $COMMIT_COUNT new commit(s)" \
            --arg desc "$COMMIT_LIST" \
            '{
              embeds: [{
                author: { name: $name, icon_url: $icon },
                title: $title,
                description: $desc,
                color: 7506394
              }]
            }')

          # 6. Kirim ke Discord menggunakan token dari secret DISCORD_NOTIF
          echo "Mengirim $COMMIT_COUNT commit ke Discord..."
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "$DISCORD_NOTIF"
